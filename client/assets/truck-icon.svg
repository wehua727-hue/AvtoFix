<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" width="200" height="120">
  <!-- Truck body -->
  <rect x="20" y="40" width="100" height="50" fill="none" stroke="black" stroke-width="2" rx="4"/>
  
  <!-- Truck cabin -->
  <rect x="110" y="30" width="40" height="30" fill="none" stroke="black" stroke-width="2" rx="2"/>
  
  <!-- Cabin window -->
  <rect x="118" y="38" width="16" height="16" fill="none" stroke="black" stroke-width="1.5"/>
  
  <!-- Truck bed -->
  <line x1="120" y1="40" x2="120" y2="90" stroke="black" stroke-width="2"/>
  
  <!-- Front wheel -->
  <circle cx="50" cy="95" r="12" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="50" cy="95" r="6" fill="black"/>
  
  <!-- Back wheel left -->
  <circle cx="100" cy="95" r="12" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="100" cy="95" r="6" fill="black"/>
  
  <!-- Back wheel right -->
  <circle cx="115" cy="95" r="12" fill="none" stroke="black" stroke-width="2"/>
  <circle cx="115" cy="95" r="6" fill="black"/>
  
  <!-- Bumper -->
  <line x1="20" y1="88" x2="20" y2="95" stroke="black" stroke-width="2"/>
  
  <!-- Cargo lines (to show it's a truck) -->
  <line x1="30" y1="55" x2="110" y2="55" stroke="black" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="30" y1="70" x2="110" y2="70" stroke="black" stroke-width="1" stroke-dasharray="3,3"/>
</svg>
